<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ Mind Mapper — Launcher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a14; color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  h1 { font-size: 28px; color: #00f0ff; margin-bottom: 6px; }
  .subtitle { color: #6677aa; font-size: 14px; margin-bottom: 40px; }
  .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; width: 100%; max-width: 700px; }
  .tool-card {
    background: #111124; border: 1px solid #2a2a4a; border-radius: 12px;
    padding: 20px 24px; transition: all 0.2s;
  }
  .tool-card:hover { border-color: #00f0ff; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,240,255,0.1); }
  .tool-icon { font-size: 36px; margin-bottom: 10px; }
  .tool-name { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .tool-desc { font-size: 13px; color: #6677aa; margin-bottom: 16px; line-height: 1.5; }
  .link-group { display: flex; flex-direction: column; gap: 6px; }
  .link-btn {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-radius: 7px; text-decoration: none; font-size: 13px;
    border: 1px solid #2a2a4a; transition: all 0.15s;
  }
  .link-btn.primary { background: rgba(0,240,255,0.08); color: #00f0ff; border-color: #00f0ff44; }
  .link-btn.primary:hover { background: rgba(0,240,255,0.15); }
  .link-btn.secondary { background: rgba(255,255,255,0.04); color: #9999bb; }
  .link-btn.secondary:hover { border-color: #6677aa; color: #e0e0f0; }
  .link-label { flex: 1; }
  .link-badge {
    font-size: 10px; background: rgba(0,0,0,0.3); padding: 2px 6px;
    border-radius: 4px; color: #6677aa;
  }
  #ip-info { margin-top: 32px; color: #4455aa; font-size: 12px; font-family: monospace; }
  .spinner { width: 28px; height: 28px; border: 2px solid #2a2a4a; border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h1>🗺️ Mind Mapper</h1>
<p class="subtitle">Workspace visualizer — local network launcher</p>

<div id="content"><div class="spinner"></div></div>
<div id="ip-info"></div>

<script>
async function init() {
  let info = null;
  try {
    const res = await fetch('/api/info');
    info = await res.json();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<p style="color:#ff4466">⚠️ Could not reach API. Is Mind Mapper running?</p>';
    return;
  }

  const lan = info.host;
  document.getElementById('ip-info').textContent = `Machine LAN IP: ${lan}`;

  const tools = [
    {
      icon: '🗺️',
      name: 'Mind Mapper',
      desc: `Workspace visualizer for markdown files. ${info.agents} agents detected, scanning ${info.workspace}.`,
      local: info.local,
      network: info.url,
    },
  ];

  const grid = tools.map(t => `
    <div class="tool-card">
      <div class="tool-icon">${t.icon}</div>
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc">${t.desc}</div>
      <div class="link-group">
        <a class="link-btn primary" href="${t.network}" target="_blank">
          <span>🌐</span>
          <span class="link-label">${t.network}</span>
          <span class="link-badge">LAN</span>
        </a>
        <a class="link-btn secondary" href="${t.local}" target="_blank">
          <span>💻</span>
          <span class="link-label">${t.local}</span>
          <span class="link-badge">local</span>
        </a>
      </div>
    </div>`).join('');

  document.getElementById('content').innerHTML =
    `<div class="tool-grid">${grid}</div>`;
}

init();
</script>
</body>
</html>
